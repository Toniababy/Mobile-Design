<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/6c14a872c1.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&" />

  <title>Design</title>
</head>


<body class="flex justify-center bg-[#F4F4F4] min-h-screen antialiased bg-slate-100">
    
    <div class="w-full max-w-[390px] flex flex-col min-h-screen bg-white relative overflow-hidden shadow-2xl ">

        <nav class="flex justify-between items-center p-5 border-b border-grey-400">
            <div class="w-8 h-8 ">
                <span class="material-symbols-outlined text-[#060011]">grid_layout_side</span>
            </div>
            <div class="flex items-center gap-8">
                <span class="material-symbols-outlined text-[#060011]">light_mode</span> 
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#3b0a0a] via-[#4E0505] to-[#0f172a] text-white flex items-center justify-center">
                    TA
                </div>
            </div>
        </nav>

        <div class="px-4 mt-2">
            <div class="rounded-xl bg-gradient-to-br from-gray-200 via-gray-100 to-white bg-opacity-90 border border-gray-300 shadow-sm py-8 text-center">
    
                <span class="material-symbols-outlined text-[100px] text-[#1d2d44]">trophy</span>
                <h1 class="text-2xl font-bold text-[#060011] mb-2">The Ultimate Draw</h1>

                <p class="text-gray-500 text-xl px-7 mb-4">Beyond the Bet. Your Moment to Win.</p>

                <div class="mt-6 mb-4 flex justify-center">
                    <div class="flex rounded-full px-5 py-2 bg-gray-300 items-center gap-2">
                        <span class="font-bold text-[#060011]">$</span>
                        <span class="font-bold text-[#060011] text-xl">₦235,000</span>
                        <span class="text-gray-500 text-sm ml-1">Current pool</span>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-2 text-center">
                    <div>
                        <h2 class="text-2xl font-bold text-[#060011]">4</h2>
                        <p class="text-xs font-semibold text-gray-500">Days</p>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-[#060011]">23</h2>
                        <p class="text-xs font-semibold text-gray-500">Hours</p>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-[#060011]">44</h2>
                        <p class="text-xs font-semibold text-gray-500">Minutes</p>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-[#060011]">20</h2>
                        <p class="text-xs font-semibold text-gray-500">Seconds</p>
                    </div>
                </div>
         
        </div>
        </div>

        <div class="px-4 ">
            <div class="rounded-2xl p-6 mt-6 border">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-ticket text-xl text-[#060011]"></i>
                <h2 class="font-semibold text-xl text-[#060011]">Purchase Tickets</h2>
            </div>
            <p class="text-sm text-[#060011] font-semibold mb-4">Number of Tickets</p>
            <div class="flex items-start gap-3">
                <button class="w-12 h-12 border rounded-lg text-xl">-</button>
                <div class="w-20 bg-gray-100 h-12 border rounded-lg flex items-center justify-center text-lg font-semibold">1</div>
                <button class="w-12 h-12 border bg-gray-100 rounded-lg text-xl">+</button>
            </div>
        </div>
        </div>

     <!-- 

-->
    </div> 
</body>

</html>
