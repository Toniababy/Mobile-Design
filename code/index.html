<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/6c14a872c1.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_drop_down" />
  <link rel="stylesheet" href="index.css">
  <title>Design</title>
</head>
<body class="flex justify-center min-h-screen antialiased bg-slate-100">
    
    <div class="w-full max-w-[390px] flex flex-col bg-[#09625B] text-white min-h-screen relative overflow-hidden shadow-2xl">

        <div class="flex justify-between items-center w-full px-6 pt-4 text-[13px] font-medium">
            <span>5:13</span>
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-signal text-[10px]"></i>
                <i class="fa-solid fa-wifi text-[10px]"></i>
                <div class="flex items-center gap-0.5">
                    <span class="text-[10px] font-bold">76</span>
                    <i class="fa-solid fa-battery-three-quarters text-sm"></i>
                </div>
            </div>
        </div>
            
        <div class="px-4 mt-2 relative z-10">
            <div class="bg-black/20 backdrop-blur-md rounded-2xl p-3 border border-white/10 flex items-center gap-3">
                <div class="w-8 h-8"><img src="../notification.png" alt=""></div>
                <div class="flex-1">
                    <div class="flex justify-between items-center">
                        <span class="text-sm tracking-wide ">Notification Title</span>
                        <span class="text-sm">Just Now</span>
                    </div>
                    <p class=" text-[10px] leading-tight ">
                        <#> Your Split verification code is 747787
                    </p>
                </div>
            </div>
        </div>
        <div class="px-5 text-white " >
            <h1 class="text-[20px] font-bold leading-tight" style=" position: absolute; top: 92px;">Code</h1>
            <p class=" mt-7 text-sm leading-relaxed">
                We have sent a 6 digit code to +234 <br> 50 080 400 004
            </p>
        </div>

        <div class="flex-grow"></div>

        <div class="px-[60px] mt-16 flex justify-between gap-2">
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
           <div class="w-3 h-3 bg-white/40 rounded-full"></div>
        </div>

        

        <div class="text-white/70 mt-24 text-center ">
            <p>you can ask for a new code in <strong>56 seconds</strong></p>
        </div>



        <div class="bg-black/70 px-4 pt-4 pb-8">
            <div class="text-center  text-white/60 m-1">
                <p>From Messages</p>
                <p>747787</p>
            </div>
            <div class="grid grid-cols-3 gap-3 text-white">
                <button class="bg-white/10 py-1 rounded-lg text-xl">1</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">2</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">3</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">4</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">5</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">6</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">7</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">8</button>
                <button class="bg-white/10 py-2 rounded-lg text-xl">9</button>
                <div></div>
                <button class="bg-white/10 py-2 rounded-lg text-xl">0</button>
                <button class=" py-2 rounded-lg text-xl flex items-center justify-center">
                    <i class="fa-solid fa-delete-left"></i>
                </button>
            </div>
            <div class="w-32 h-1 bg-white/30 mx-auto mt-4 rounded-full"></div>
        </div>

    </div> 
</body>
</html>
